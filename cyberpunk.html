                extend: {

                            pink: '#f43f5e',
                            gold: '#fbbf24',
                            blue: '#3b82f6'

                    },
                    backgroundImage: {
                        'subtle-grid': "url('data:image/svg+xml,%3Csvg width=\"40\" height=\"40\" viewBox=\"0 0 40 40\" xmlns=\"http://www.w3.org/2000/svg\"%3E%3Cpath d=\"M0 40L40 0H20L0 20M40 40V20L20 40\" stroke=\"%23ffffff\" stroke-opacity=\"0.03\" fill=\"none\"/%3E%3C/svg%3E')",
                        'gradient-radial': 'radial-gradient(circle at center, var(--tw-gradient-stops))',
                    },
                    animation: {
                        'float': 'float 6s ease-in-out infinite',
                        'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'shimmer': 'shimmer 2s infinite',
                        'bounce-slow': 'bounce 3s infinite',
                    },
                    keyframes: {
                        float: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-10px)' },
                        },
                        shimmer: {
                            '0%': { backgroundPosition: '-200px 0' },
                            '100%': { backgroundPosition: '200px 0' },
                        }
                    }
                }
            }
        }
    </script>

    <style>
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #050507; }
        ::-webkit-scrollbar-thumb { background: linear-gradient(45deg, #7c3aed, #06b6d4); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: linear-gradient(45deg, #06b6d4, #7c3aed); }

        .glass {
            background: rgba(19, 19, 31, 0.75);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .glass-panel {
            background: rgba(15, 15, 20, 0.85);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }

        .gradient-border {
            position: relative;
            background: linear-gradient(45deg, #7c3aed, #06b6d4, #f43f5e);
            border-radius: 12px;
            padding: 2px;
        }
        .gradient-border > div {
            background: #0a0a0f;
            border-radius: 10px;
            width: 100%;
            height: 100%;
        }

        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .loader {
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            border-top: 2px solid #06b6d4;
            width: 20px;
            height: 20px;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Toggle Switch */
        .toggle-checkbox:checked {
            right: 0;
            border-color: #7c3aed;
        }
        .toggle-checkbox:checked + .toggle-label {
            background-color: #7c3aed;
        }

        .shimmer-bg {
            background: linear-gradient(90deg, rgba(255,255,255,0) 0%, rgba(255,255,255,0.03) 50%, rgba(255,255,255,0) 100%);
            background-size: 200% 100%;
            animation: shimmer 2s infinite;
        }

        .typewriter {
            overflow: hidden;
            border-right: 2px solid #7c3aed;
            white-space: nowrap;
            animation: typing 3.5s steps(40, end), blink-caret 0.75s step-end infinite;
        }

        @keyframes typing {
            from { width: 0 }
            to { width: 100% }
        }

        @keyframes blink-caret {
            from, to { border-color: transparent }
            50% { border-color: #7c3aed }
        }
    </style>
</head>

        function showToast(message, type = 'info') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');

            let borderClass = type === 'success' ? 'border-nexus-green' :
                            type === 'error' ? 'border-nexus-pink' :
                            type === 'warning' ? 'border-nexus-gold' : 'border-nexus-cyan';
            let iconClass = type === 'success' ? 'fa-check-circle text-nexus-green' :
                          type === 'error' ? 'fa-exclamation-circle text-nexus-pink' :
                          type === 'warning' ? 'fa-exclamation-triangle text-nexus-gold' : 'fa-info-circle text-nexus-cyan';

            toast.className = `glass-panel p-4 rounded-lg border-l-4 ${borderClass} flex items-center gap-3 transform transition-all duration-300 translate-x-10 opacity-0 min-w-[300px] pointer-events-auto z-50`;
            toast.innerHTML = `
                <i class="fa-solid ${iconClass} text-lg"></i>
                <div class="flex-1">
                    <div class="text-sm font-medium text-white">${message}</div>
                </div>
                <button onclick="this.parentElement.remove()" class="text-gray-400 hover:text-white">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            `;

            container.appendChild(toast);
            requestAnimationFrame(() => {
                toast.classList.remove('translate-x-10', 'opacity-0');
            });

            setTimeout(() => {
                if (toast.parentElement) {
                    toast.classList.add('translate-x-10', 'opacity-0');
                    setTimeout(() => toast.remove(), 300);
                }
            }, 4000);
        }

        function initInvestChart() {
            const el = document.getElementById('investChart');
            if (!el) return;

            const chart = echarts.init(el);

            const dates = [];
            const portfolioValues = [];
            let value = 10000;

            for (let i = 30; i >= 0; i--) {
                const date = new Date();
                date.setDate(date.getDate() - i);
                dates.push(date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }));

                // Random walk with upward bias
                value += (Math.random() - 0.3) * 200;
                portfolioValues.push(Math.max(9000, value));
            }

            const option = {
                backgroundColor: 'transparent',
                grid: {
                    left: '3%',
                    right: '4%',
                    bottom: '10%',
                    top: '10%',

        // --- PAYMENT FUNCTIONS ---
        function initiateTransfer(amount, recipient, note = '') {
            // Simulate API call
            showToast(`Transferring ${formatCurrency(amount)} to ${recipient}...`, 'info');

            setTimeout(() => {
                showToast(`Success! ${formatCurrency(amount)} sent to ${recipient}`, 'success');

                // Add to transactions
                const newTransaction = {
                    id: Date.now(),
                    merchant: recipient,
                    category: 'Transfer',
                    amount: -amount,
                    date: 'Just now',
                    icon: 'fa-paper-plane',
                    type: 'debit',
                    status: 'completed'
                };

                state.transactions.unshift(newTransaction);
                state.user.totalLiquidity -= amount;

                // Update UI if we're on dashboard
                if (state.view === 'dashboard') {
                    renderDashboardContent();
                }
            }, 1500);
        }

        function payBill(billId) {
            const bill = state.upcomingBills.find(b => b.id === billId);
            if (!bill) return;

            showToast(`Paying ${bill.name} bill...`, 'info');

            setTimeout(() => {
                showToast(`${bill.name} bill paid successfully!`, 'success');

                // Update bill
                const nextDate = new Date();
                nextDate.setMonth(nextDate.getMonth() + 1);
                bill.date = nextDate.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });

                // Add transaction
                state.transactions.unshift({
                    id: Date.now(),
                    merchant: bill.name,
                    category: bill.category,
                    amount: -bill.amount,
                    date: 'Just now',
                    icon: bill.icon,
                    type: 'debit',
                    status: 'completed'
                });

                state.user.monthlySpending += bill.amount;

                if (state.view === 'dashboard') {
                    renderDashboardContent();
                }
            }, 1500);
        }

        function toggleCardStatus(cardId) {
            const card = state.cards.find(c => c.id === cardId);
            if (!card) return;

            const newStatus = card.status === 'Active' ? 'Frozen' : 'Active';
            card.status = newStatus;

            showToast(`${card.name} card ${newStatus.toLowerCase()}`, newStatus === 'Active' ? 'success' : 'warning');

            if (state.view === 'accounts') {
                renderAccountsContent();
            }
        }

        // --- MODAL TOGGLE FUNCTION ---
        function toggleModal(modalId) {
            const modal = document.getElementById(modalId);
            if (!modal) return;

            const content = modal.querySelector('div');

            if (modal.classList.contains('hidden')) {
                modal.classList.remove('hidden');
                void modal.offsetWidth; // Trigger reflow
                modal.classList.remove('opacity-0');
                content.classList.remove('scale-95');
                content.classList.add('scale-100');
            } else {
                modal.classList.add('opacity-0');
                content.classList.remove('scale-100');
                content.classList.add('scale-95');
                setTimeout(() => modal.classList.add('hidden'), 200);
            }
        }

        // --- MOBILE MENU TOGGLE ---

            // Add event listeners for toggle switches
            document.addEventListener('change', (e) => {
                if (e.target.type === 'checkbox') {
                    const label = e.target.closest('label');
                    if (label) {
                        const settingName = label.querySelector('.text-sm')?.textContent;
                        if (settingName) {
                            showToast(`${settingName} ${e.target.checked ? 'enabled' : 'disabled'}`, 'info');
                        }
                    }
                }
            });
        };
