<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>All Studios & Creators</title>
    
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* CSS Reset and Base Styles */
        :root {
            --slate-50: #f8fafc;
            --slate-200: #e2e8f0;
            --slate-300: #cbd5e1;
            --slate-400: #94a3b8;
            --slate-500: #64748b;
            --slate-600: #475569;
            --slate-700: #334155;
            --slate-800: #1e293b;
            --slate-900: #0f172a;
            --indigo-600: #4f46e5;
            --emerald-600: #059669;
            --amber-600: #d97706;
            --red-600: #dc2626;
            --white: #ffffff;
        }

        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--slate-50);
            color: var(--slate-800);
            line-height: 1.5;
        }

        button, input, a {
            font-family: inherit;
            font-size: 100%;
            border: none;
            background: none;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
        }

        /* Main Container */
        .container {
            max-width: 1280px;
            margin-left: auto;
            margin-right: auto;
            padding: 1rem;
        }

        /* Header Section */
        .header {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 1.5rem;
            gap: 1rem;
        }
        .header-title h1 {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--slate-900);
        }
        .header-title p {
            margin-top: 0.25rem;
            font-size: 0.875rem;
            color: var(--slate-500);
        }
        .header-actions {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }
        .btn {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            white-space: nowrap;
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            font-size: 0.875rem;
            font-weight: 500;
            box-shadow: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            transition: background-color 0.2s, opacity 0.2s, transform 0.2s;
        }
        .btn-primary {
            background-color: var(--indigo-600);
            color: var(--white);
        }
        .btn-primary:hover {
            background-color: #4338ca;
        }
        .btn-danger {
            background-color: var(--red-600);
            color: var(--white);
        }
        .btn-danger:hover {
            background-color: #b91c1c;
        }
        .btn svg {
            width: 16px;
            height: 16px;
        }

        /* Filters & Search Section */
        .filters-search-section {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: flex-start;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }
        .search-and-delete {
            display: flex;
            gap: 0.75rem;
            width: 100%;
        }
        .search-box {
            position: relative;
            flex-grow: 1;
        }
        .search-box svg {
            position: absolute;
            left: 0.75rem;
            top: 50%;
            transform: translateY(-50%);
            width: 18px;
            height: 18px;
            color: var(--slate-400);
        }
        .search-box input {
            width: 100%;
            padding: 0.5rem 1rem 0.5rem 2.5rem;
            border: 1px solid var(--slate-300);
            background-color: var(--white);
            border-radius: 0.5rem;
            font-size: 0.875rem;
        }
        .search-box input:focus {
            outline: 2px solid transparent;
            outline-offset: 2px;
            border-color: var(--indigo-600);
            box-shadow: 0 0 0 2px var(--indigo-600);
        }
        .filters {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            flex-wrap: wrap;
        }
        .filter-dropdown-container {
            position: relative;
        }
        .filter-button {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.875rem;
            color: var(--slate-600);
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            border: 1px solid var(--slate-300);
            background-color: var(--white);
            transition: border-color 0.2s;
            box-shadow: 0 1px 2px 0 rgb(0 0 0 / 0.05);
        }
        .filter-button:hover {
            border-color: var(--slate-400);
        }
        .filter-dropdown-container.active .filter-button {
            border-color: var(--indigo-600);
        }
        .filter-button svg {
            width: 16px;
            height: 16px;
        }
        .filter-dropdown {
            position: absolute;
            top: 100%;
            left: 0;
            margin-top: 0.5rem;
            z-index: 20;
            width: 200px;
            background-color: var(--white);
            border-radius: 0.5rem;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
            border: 1px solid #e5e7eb;
            opacity: 0;
            transform: translateY(-10px);
            visibility: hidden;
            transition: opacity 0.2s ease, transform 0.2s ease, visibility 0.2s;
        }
        .filter-dropdown-container.active .filter-dropdown {
            opacity: 1;
            transform: translateY(0);
            visibility: visible;
        }
        .filter-dropdown a {
            display: block;
            padding: 0.5rem 1rem;
            font-size: 0.875rem;
        }
        .filter-dropdown a:hover {
            background-color: var(--slate-50);
        }

        /* Main Content Card */
        .table-card {
            background-color: var(--white);
            border-radius: 0.75rem;
            border: 1px solid #e5e7eb;
        }
        .table-container {
            width: 100%;
            overflow-x: auto;
            overflow-y: hidden;
        }
        /* Custom Scrollbar Styling */
        .table-container::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        .table-container::-webkit-scrollbar-track {
            background: var(--slate-50);
            border-radius: 10px;
        }
        .table-container::-webkit-scrollbar-thumb {
            background: var(--slate-300);
            border-radius: 10px;
        }
        .table-container::-webkit-scrollbar-thumb:hover {
            background: var(--slate-400);
        }
        
        table {
            width: 100%;
            text-align: left;
            font-size: 0.875rem;
            border-collapse: collapse;
        }
        thead tr {
            border-bottom: 1px solid #e5e7eb;
        }
        th, td {
            padding: 1rem;
            white-space: nowrap;
        }
        th:first-child, td:first-child {
            padding-left: 1.5rem;
        }
        th:last-child, td:last-child {
            padding-right: 1.5rem;
        }
        th {
            font-weight: 500;
            color: var(--slate-500);
        }
        tbody tr {
            border-bottom: 1px solid #e5e7eb;
        }
        tbody tr:last-child {
            border-bottom: none;
        }
        tbody tr:hover {
            background-color: #f8fafc99;
        }
        .creator-cell {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }
        .creator-cell img {
            width: 32px;
            height: 32px;
            border-radius: 9999px;
            object-fit: cover;
        }
        .status-running { color: var(--emerald-600); font-weight: 500; }
        .status-suspended { color: var(--amber-600); font-weight: 500; }
        .status-expired { color: var(--red-600); font-weight: 500; }

        .actions-cell {
            text-align: center;
        }
        .actions-wrapper {
            position: relative;
            display: inline-block;
        }
        .actions-button:hover {
            color: var(--slate-800);
        }
        .actions-dropdown {
            position: absolute;
            right: 0;
            top: 100%;
            margin-top: 0.25rem;
            z-index: 10;
            width: 9rem;
            background-color: var(--white);
            border-radius: 0.375rem;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
            border: 1px solid #e5e7eb;
            opacity: 0;
            transform: translateY(-10px);
            visibility: hidden;
            transition: opacity 0.2s ease, transform 0.2s ease, visibility 0.2s;
        }
        .actions-wrapper.active .actions-dropdown {
             opacity: 1;
            transform: translateY(0);
            visibility: visible;
        }
        .actions-dropdown a {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1rem;
        }
        .actions-dropdown a:hover {
            background-color: var(--slate-50);
        }

        /* Pagination */
        .pagination {
            margin-top: 1.5rem;
            padding: 1rem 0;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
        }
        .pagination-links {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .pagination a, .pagination button {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 2rem;
            height: 2rem;
            border-radius: 0.375rem;
            font-size: 0.875rem;
            color: var(--slate-600);
            transition: background-color 0.2s;
        }
        .pagination a.page-arrow, .pagination button.page-arrow {
            width: auto;
            font-weight: 500;
            padding: 0 0.5rem;
        }
        .pagination a.page-arrow:hover, .pagination button.page-arrow:hover {
            color: var(--slate-900);
        }
        .pagination a.page-number:hover, .pagination button.page-number:hover {
            background-color: var(--slate-200);
        }
        .pagination a.active, .pagination button.active {
            background-color: var(--indigo-600);
            color: var(--white);
            font-weight: 600;
            box-shadow: 0 1px 2px 0 rgb(0 0 0 / 0.05);
        }
        
        /* Custom Checkbox */
        .custom-checkbox {
            width: 1rem;
            height: 1rem;
            accent-color: var(--indigo-600);
        }

        /* Media Queries for Responsive Design */
        @media (min-width: 768px) {
            .container {
                padding: 1.5rem;
            }
            .header, .filters-search-section, .pagination {
                flex-direction: row;
                align-items: center;
            }
            .search-and-delete {
                width: auto;
            }
            .search-box {
                width: 16rem;
            }
        }
        @media (min-width: 1024px) {
            .container {
                padding: 2rem;
            }
        }

    </style>
</head>
<body>

    <div class="container">
        
        <!-- Header Section -->
        <header class="header">
            <div class="header-title">
                <h1>All Studios & Creators</h1>
                <p>A list of all studios and creators</p>
            </div>
            <div class="header-actions">
                <button class="filter-button">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" x2="12" y1="3" y2="15"/></svg>
                    <span>Export</span>
                </button>
                <button class="btn btn-primary">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                    <span>Add Studio/Creator</span>
                </button>
            </div>
        </header>

        <!-- Filters and Search Section -->
        <div class="filters-search-section">
            <div class="search-and-delete">
                 <div class="search-box">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
                    <input type="text" placeholder="Search by show">
                </div>
                <button id="deleteSelectedBtn" class="btn btn-danger" style="display: none;">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></svg>
                    <span>Delete</span>
                </button>
            </div>
            <div class="filters">
                <div class="filter-dropdown-container">
                    <button class="filter-button">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M7 12h10"/><path d="M10 18h4"/></svg>
                        <span>Status</span>
                    </button>
                    <div class="filter-dropdown">
                        <a href="#">All</a>
                        <a href="#">Running</a>
                        <a href="#">Suspended</a>
                        <a href="#">Expired</a>
                    </div>
                </div>
                <div class="filter-dropdown-container">
                    <button class="filter-button">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 20h16a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-5.5a1 1 0 0 1-.8-.4L9.7 3.6a1 1 0 0 0-.8-.4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2Z"/><path d="M8 10v4"/><path d="M12 10v2"/><path d="M16 10v6"/></svg>
                        <span>Category</span>
                    </button>
                     <div class="filter-dropdown">
                        <a href="#">All</a>
                        <a href="#">Theatre</a>
                        <a href="#">Concert</a>
                        <a href="#">Dynamic</a>
                        <a href="#">Music</a>
                    </div>
                </div>
                 <div class="filter-dropdown-container">
                    <button class="filter-button">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/></svg>
                        <span>Date listed</span>
                    </button>
                     <div class="filter-dropdown">
                        <a href="#">Any Date</a>
                        <a href="#">Today</a>
                        <a href="#">Last 7 days</a>
                        <a href="#">Last 30 days</a>
                    </div>
                </div>
                <div class="filter-dropdown-container">
                    <button class="filter-button" id="display-filter-btn">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" x2="21" y1="6" y2="6"/><line x1="8" x2="21" y1="12" y2="12"/><line x1="8" x2="21" y1="18" y2="18"/><line x1="3" x2="3.01" y1="6" y2="6"/><line x1="3" x2="3.01" y1="12" y2="12"/><line x1="3" x2="3.01" y1="18" y2="18"/></svg>
                        <span>Display</span>
                    </button>
                     <div class="filter-dropdown" id="display-options-dropdown">
                        <a href="#" data-value="5">5 per page</a>
                        <a href="#" data-value="10">10 per page</a>
                        <a href="#" data-value="20">20 per page</a>
                    </div>
                </div>
                 <div class="filter-dropdown-container">
                    <button class="filter-button">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="21" x2="14" y1="4" y2="4"/><line x1="10" x2="3" y1="4" y2="4"/><line x1="21" x2="12" y1="12" y2="12"/><line x1="8" x2="3" y1="12" y2="12"/><line x1="21" x2="16" y1="20" y2="20"/><line x1="12" x2="3" y1="20" y2="20"/><line x1="14" x2="14" y1="2" y2="6"/><line x1="8" x2="8" y1="10" y2="14"/><line x1="16" x2="16" y1="18" y2="22"/></svg>
                        <span>All Filters</span>
                    </button>
                     <div class="filter-dropdown">
                        <a href="#">Coming Soon...</a>
                    </div>
                </div>
            </div>
        </div>

        <!-- Main Content Card -->
        <div class="table-card">
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th><input type="checkbox" id="selectAllCheckbox" class="custom-checkbox"></th>
                            <th style="min-width: 200px;">Name of studio/creator</th>
                            <th>Category</th>
                            <th>Status</th>
                            <th>Date Added</th>
                            <th style="text-align: center;">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        <!-- Rows will be dynamically inserted here by JavaScript -->
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Pagination Section -->
        <div class="pagination">
            <button class="page-arrow" id="prev-page">&larr; Previous</button>
            <nav class="pagination-links" id="pagination-links">
                <!-- Page numbers will be inserted here by JavaScript -->
            </nav>
            <button class="page-arrow" id="next-page">Next &rarr;</button>
        </div>

    </div>
    
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // --- STATE MANAGEMENT ---
            let currentPage = 1;
            let itemsPerPage = 5;
            let currentData = [];

            // --- DOM ELEMENT REFERENCES ---
            const tableBody = document.getElementById('tableBody');
            const selectAllCheckbox = document.getElementById('selectAllCheckbox');
            const deleteSelectedBtn = document.getElementById('deleteSelectedBtn');
            const paginationLinks = document.getElementById('pagination-links');
            const prevPageBtn = document.getElementById('prev-page');
            const nextPageBtn = document.getElementById('next-page');
            
            const initialData = [
                { id: 1, name: 'Sarkodie', avatar: 'https://placehold.co/40x40/7c3aed/ffffff?text=S', category: 'Theatre', status: 'Running', date: '26 Feb 2025' },
                { id: 2, name: 'National Theater of Ghana', avatar: 'https://placehold.co/40x40/f59e0b/ffffff?text=N', category: 'Concert', status: 'Running', date: '23 Feb 2025' },
                { id: 3, name: 'Roverman Productions', avatar: 'https://placehold.co/40x40/ef4444/ffffff?text=R', category: 'Dynamic', status: 'Expired', date: '20 Feb 2024' },
                { id: 4, name: 'Accra Hearts Of Oak', avatar: 'https://i.imgur.com/0DElr0H.png', category: 'Concert', status: 'Suspended', date: '22 Dec 2024' },
                { id: 5, name: 'Another Studio', avatar: 'https://placehold.co/40x40/22c55e/ffffff?text=A', category: 'Music', status: 'Running', date: '15 Jan 2025' },
                { id: 6, name: 'Kofi Kinaata', avatar: 'https://placehold.co/40x40/3b82f6/ffffff?text=K', category: 'Music', status: 'Running', date: '10 Jan 2025' },
                { id: 7, name: 'Joy FM', avatar: 'https://placehold.co/40x40/f97316/ffffff?text=J', category: 'Dynamic', status: 'Running', date: '05 Jan 2025' },
                { id: 8, name: 'Citi FM', avatar: 'https://placehold.co/40x40/14b8a6/ffffff?text=C', category: 'Dynamic', status: 'Suspended', date: '01 Jan 2025' },
                { id: 9, name: 'Charterhouse', avatar: 'https://placehold.co/40x40/8b5cf6/ffffff?text=C', category: 'Concert', status: 'Running', date: '28 Dec 2024' },
                { id: 10, name: 'Silverbird Cinemas', avatar: 'https://placehold.co/40x40/ec4899/ffffff?text=S', category: 'Theatre', status: 'Expired', date: '25 Dec 2024' },
                { id: 11, name: 'GH One TV', avatar: 'https://placehold.co/40x40/6366f1/ffffff?text=G', category: 'Dynamic', status: 'Running', date: '20 Dec 2024' }
            ];
            currentData = initialData;

            // --- FUNCTION DEFINITIONS ---
            
            function getStatusClass(status) {
                if (status === 'Running') return 'status-running';
                if (status === 'Suspended') return 'status-suspended';
                if (status === 'Expired') return 'status-expired';
                return '';
            }
            
            function render() {
                renderTable();
                setupPagination();
                updateDeleteButtonVisibility();
            }

            function renderTable() {
                tableBody.innerHTML = '';
                const start = (currentPage - 1) * itemsPerPage;
                const end = start + itemsPerPage;
                const paginatedData = currentData.slice(start, end);

                paginatedData.forEach(item => {
                    const row = document.createElement('tr');
                    row.dataset.id = item.id;
                    row.innerHTML = `
                        <td><input type="checkbox" class="row-checkbox custom-checkbox"></td>
                        <td>
                            <div class="creator-cell">
                                <img src="${item.avatar}" alt="creator"/>
                                <span>${item.name}</span>
                            </div>
                        </td>
                        <td>${item.category}</td>
                        <td><span class="${getStatusClass(item.status)}">${item.status}</span></td>
                        <td>${item.date}</td>
                        <td class="actions-cell">
                            <div class="actions-wrapper">
                                <button class="actions-button">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/></svg>
                                </button>
                                <div class="actions-dropdown">
                                    <a href="#">View</a>
                                    <a href="#">Deactivate</a>
                                </div>
                            </div>
                        </td>
                    `;
                    tableBody.appendChild(row);
                });
                addRowCheckboxListeners();
            }

            function setupPagination() {
                paginationLinks.innerHTML = '';
                const pageCount = Math.ceil(currentData.length / itemsPerPage);

                for (let i = 1; i <= pageCount; i++) {
                    const pageButton = document.createElement('button');
                    pageButton.className = 'page-number';
                    pageButton.textContent = i;
                    if (i === currentPage) {
                        pageButton.classList.add('active');
                    }
                    pageButton.addEventListener('click', () => {
                        currentPage = i;
                        render();
                    });
                    paginationLinks.appendChild(pageButton);
                }
            }

            function handleDropdown(event) {
                const trigger = event.target.closest('.filter-button, .actions-button');
                if (!trigger) {
                    closeAllDropdowns();
                    return;
                }
                
                const parentContainer = trigger.closest('.filter-dropdown-container, .actions-wrapper');
                const wasActive = parentContainer.classList.contains('active');
                closeAllDropdowns();
                if (!wasActive) {
                    parentContainer.classList.add('active');
                }
            }
            
            function closeAllDropdowns() {
                 document.querySelectorAll('.filter-dropdown-container.active, .actions-wrapper.active').forEach(container => {
                    container.classList.remove('active');
                });
            }

            function updateDeleteButtonVisibility() {
                const selectedCount = document.querySelectorAll('.row-checkbox:checked').length;
                deleteSelectedBtn.style.display = selectedCount > 0 ? 'flex' : 'none';
                if (selectedCount === 0) {
                    selectAllCheckbox.checked = false;
                }
            }
            
            function addRowCheckboxListeners() {
                const rowCheckboxes = document.querySelectorAll('.row-checkbox');
                rowCheckboxes.forEach(checkbox => {
                    checkbox.addEventListener('change', () => {
                        updateDeleteButtonVisibility();
                        if (!checkbox.checked) {
                            selectAllCheckbox.checked = false;
                        } else if (document.querySelectorAll('.row-checkbox:checked').length === rowCheckboxes.length) {
                            selectAllCheckbox.checked = true;
                        }
                    });
                });
            }

            // --- SCRIPT EXECUTION & EVENT LISTENERS ---
            render();
            window.addEventListener('click', handleDropdown);

            selectAllCheckbox.addEventListener('change', () => {
                const rowCheckboxes = document.querySelectorAll('.row-checkbox');
                rowCheckboxes.forEach(checkbox => {
                    checkbox.checked = selectAllCheckbox.checked;
                });
                updateDeleteButtonVisibility();
            });

            deleteSelectedBtn.addEventListener('click', () => {
                const selectedIds = Array.from(document.querySelectorAll('.row-checkbox:checked'))
                    .map(cb => Number(cb.closest('tr').dataset.id));
                
                currentData = currentData.filter(item => !selectedIds.includes(item.id));
                currentPage = 1; // Reset to first page
                render();
            });

            document.getElementById('display-options-dropdown').addEventListener('click', (e) => {
                if (e.target.tagName === 'A') {
                    itemsPerPage = Number(e.target.dataset.value);
                    currentPage = 1; // Reset to first page
                    render();
                }
            });

            prevPageBtn.addEventListener('click', () => {
                if (currentPage > 1) {
                    currentPage--;
                    render();
                }
            });

            nextPageBtn.addEventListener('click', () => {
                const pageCount = Math.ceil(currentData.length / itemsPerPage);
                if (currentPage < pageCount) {
                    currentPage++;
                    render();
                }
            });
        });
    </script>
</body>
</html>
