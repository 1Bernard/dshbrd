<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Management Table (Vanilla CSS)</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* Basic Reset & Body Styling */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #f9fafb;
            padding: 16px;
            /* p-4 */
            color: #374151;
            /* default text-gray-700 */
        }

        /* Table Card */
        .table-card {
            position: relative;
            max-width: 100%;
            margin-left: auto;
            margin-right: auto;
            background-color: white;
            padding: 24px;
            /* p-6 */
            border-radius: 12px;
            /* rounded-xl */
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            /* shadow-lg */
        }

        /* Header Section - Base styles (Mobile First) */
        .header-section {
            display: flex;
            flex-direction: column;
            /* Text on top, actions below */
            align-items: flex-start;
            margin-bottom: 24px;
            /* mb-6 */
        }

        .header-section h1 {
            font-size: 1.875rem;
            /* text-2xl */
            line-height: 2.25rem;
            font-weight: 600;
            /* font-semibold */
            color: #1f2937;
            /* text-gray-800 */
        }

        .header-section p {
            font-size: 0.875rem;
            /* text-sm */
            color: #6b7280;
            /* text-gray-500 */
            margin-top: 4px;
            /* mt-1 */
        }

        .header-title-description {
            margin-bottom: 16px;
        }

        /* Actions container for filters and export */
        .header-actions {
            display: flex;
            flex-direction: column;
            /* Stack filter group and export on mobile by default */
            gap: 16px;
            /* Space between filter group and export button when stacked */
            width: 100%;
            margin-top: 16px;
        }

        /* Group for filter buttons */
        .filter-buttons-group {
            display: flex;
            flex-wrap: wrap;
            /* Filter buttons themselves wrap */
            align-items: center;
            gap: 12px;
            /* gap-3 between filter buttons */
        }

        .export-button-container {
            /* Styles applied via media queries for alignment */
        }


        /* Buttons & Dropdowns General */
        .button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 8px 16px;
            /* px-4 py-2 */
            font-size: 0.875rem;
            /* text-sm */
            border-radius: 8px;
            /* rounded-lg */
            cursor: pointer;
            transition: background-color 0.2s ease, border-color 0.2s ease, color 0.2s ease;
            border: 1px solid #d1d5db;
            /* border-gray-300 */
            color: #374151;
            /* text-gray-700 */
            background-color: white;
            box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            /* shadow-sm for some buttons */
        }

        .button:hover {
            background-color: #f3f4f6;
            /* hover:bg-gray-100 or hover:bg-gray-50 */
        }

        .button:focus {
            outline: none;
            box-shadow: 0 0 0 2px white, 0 0 0 4px #6d28d9;
            /* focus:ring-2 focus:ring-offset-2 focus:ring-custom-purple */
        }

        .button svg {
            height: 16px;
            /* h-4 */
            width: 16px;
            /* w-4 */
            margin-right: 8px;
            /* mr-2 */
        }

        .button .dropdown-arrow-svg {
            margin-left: 8px;
            /* ml-2 */
            margin-right: -4px;
            /* -mr-1 */
            height: 20px;
            /* h-5 */
            width: 20px;
            /* w-5 */
        }

        .button-custom-purple-outlined {
            border-width: 2px;
            border-color: #6d28d9;
            /* border-custom-purple */
            background-color: white;
            color: #6d28d9;
            /* text-custom-purple */
        }

        .button-custom-purple-outlined:hover {
            background-color: #6d28d9;
            /* hover:bg-custom-purple */
            color: white;
            /* hover:text-white */
        }

        .button-custom-purple-filled {
            /* For pagination active */
            background-color: #6d28d9;
            color: white;
            border-color: #6d28d9;
        }

        .button-custom-purple-filled:hover {
            background-color: #5b21b6;
            /* custom-purple-dark */
        }

        /* General Dropdown Container styling (used for header filters) */
        .dropdown-container {
            position: relative;
            /* Crucial for positioning the .dropdown-menu */
            display: inline-block;
            text-align: left;
        }

        /* New descriptive class for table row action dropdowns */
        .table-row-action-dropdown {
            /* position: relative; */
            display: inline-block;
            /* Ensures it wraps the button correctly */
            text-align: left;
            /* Aligns content if button was block and had text */
        }

        .table .actions-cell {
            /* This cell can remain position: static or relative if needed for other reasons,
                but the .table-row-action-dropdown handles its own menu positioning. */
        }

        .dropdown-menu {
            position: absolute;
            right: 0;
            /* Aligns to the right of its relative parent (.dropdown-container or .table-row-action-dropdown) */
            margin-top: 8px;
            width: 192px;
            border-radius: 6px;
            background-color: white;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            border: 1px solid rgba(0, 0, 0, 0.05);
            z-index: 10;
            /* Ensure menu is on top */
            opacity: 0;
            transform: translateY(-10px);
            visibility: hidden;
            transition: opacity 0.2s ease-out, transform 0.2s ease-out, visibility 0s linear 0.2s;
        }

        .dropdown-menu.show {
            opacity: 1;
            transform: translateY(0);
            visibility: visible;
            transition-delay: 0s, 0s, 0s;
        }

        /* Specific adjustments for the actions dropdown menu if needed */
        .table-row-action-dropdown .actions-dropdown-menu {
            margin-top: 4px;
            /* Slightly less margin for a compact look next to the "..." button */
        }

        .dropdown-menu a {
            display: block;
            padding: 8px 16px;
            font-size: 0.875rem;
            color: #374151;
            text-decoration: none;
        }

        .dropdown-menu a:hover {
            background-color: #f3f4f6;
        }

        .dropdown-menu a svg {
            display: inline;
            height: 16px;
            width: 16px;
            margin-right: 8px;
        }


        /* Table Section */
        .table-container {
            overflow-x: auto;
            border-radius: 8px;
            border: 1px solid #e5e7eb;
        }

        .table {
            min-width: 100%;
            border-collapse: collapse;
        }

        .table thead {
            background-color: #f9fafb;
        }

        .table th,
        .table td {
            padding: 12px 16px;
            text-align: left;
            white-space: nowrap;
            font-size: 0.875rem;
        }

        .table th {
            font-size: 0.75rem;
            font-weight: 500;
            color: #6b7280;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .table td {
            border-top: 1px solid #e5e7eb;
        }

        .table tbody tr:hover {
            background-color: #f3f4f6;
        }

        .table input:where([type="checkbox"]) {
            height: 16px;
            width: 16px;
            color: #6d28d9;
            border: 1px solid #d1d5db;
            border-radius: 4px;
            vertical-align: middle;
        }

        .table input:where([type="checkbox"]):focus {
            box-shadow: 0 0 0 2px white, 0 0 0 4px #6d28d9;
        }

        .user-name {
            font-weight: 500;
            color: #111827;
        }

        .user-email {
            font-size: 0.75rem;
            color: #6b7280;
        }

        .studio-info {
            display: flex;
            align-items: center;
        }

        .studio-info img {
            height: 24px;
            width: 24px;
            border-radius: 50%;
            margin-right: 8px;
            object-fit: cover;
        }

        .studio-info span {
            color: #374151;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 6px;
        }

        .status-active-dot {
            background-color: #10b981;
        }

        .status-inactive-dot {
            background-color: #ef4444;
        }

        .status-active-text {
            color: #059669;
        }

        .status-inactive-text {
            color: #dc2626;
        }

        .actions-button {
            background: none;
            border: none;
            color: #9ca3af;
            padding: 0;
            cursor: pointer;
            display: flex;
            align-items: center;
        }

        .actions-button:hover {
            color: #6d28d9;
        }

        .actions-button svg {
            height: 20px;
            width: 20px;
            margin: 0;
        }

        .actions-dropdown-menu {
            /* Class for the menu itself, not its container */
            width: 160px;
        }

        .actions-dropdown-menu a.text-red {
            color: #dc2626;
        }


        /* Pagination Section - Default to row layout for mobile */
        .pagination-section {
            display: flex;
            flex-direction: row;
            justify-content: space-between;
            align-items: center;
            margin-top: 24px;
            /* mt-6 */
            padding-left: 8px;
            /* px-2 */
            padding-right: 8px;
            /* px-2 */
        }

        .pagination-nav-button {
            display: inline-flex;
            align-items: center;
            padding: 8px 12px;
            /* px-3 py-2 */
            font-size: 0.875rem;
            /* text-sm */
            color: #6b7280;
            /* text-gray-500 */
            border-radius: 8px;
            /* rounded-lg */
            background-color: transparent;
            border: none;
            /* Removed border */
            cursor: pointer;
        }

        .pagination-nav-button:hover {
            color: #374151;
            /* hover:text-gray-700 */
            background-color: #f3f4f6;
            /* hover:bg-gray-100 */
        }

        .pagination-nav-button:focus {
            outline: none;
            box-shadow: 0 0 0 2px #6d28d9, 0 0 0 4px rgba(109, 40, 217, 0.5);
        }

        .pagination-nav-button svg {
            height: 20px;
            /* h-5 */
            width: 20px;
            /* w-5 */
        }

        .pagination-pages {
            display: flex;
            align-items: center;
            gap: 4px;
            /* space-x-1 */
        }

        .pagination-pages button {
            padding: 4px 12px;
            /* px-3 py-1 */
            font-size: 0.875rem;
            /* text-sm */
            border-radius: 6px;
            /* rounded-md */
            border: 1px solid transparent;
            background-color: transparent;
            color: #374151;
            /* text-gray-700 */
            cursor: pointer;
        }

        .pagination-pages button:hover {
            background-color: #f3f4f6;
            /* hover:bg-gray-100 */
        }

        .pagination-pages button:focus {
            outline: none;
        }

        .pagination-pages button.active {
            background-color: #6d28d9;
            /* bg-custom-purple */
            color: white;
            border-color: #6d28d9;
        }

        .pagination-pages span {
            font-size: 0.875rem;
            /* text-sm */
            color: #374151;
            /* text-gray-700 */
        }


        /* Responsive Adjustments */
        /* Small Tablet (767px - 825px): Title top, Filters & Export together below, grouped left */
        @media (min-width: 767px) and (max-width: 825px) {
            .header-actions {
                flex-direction: row;
                justify-content: flex-start;
                /* Group filters and export to the left */
                align-items: center;
                gap: 12px;
                /* Gap between filter group and export button */
                width: 100%;
                margin-top: 16px;
            }
        }

        /* Standard Tablet (826px - 1023px): Title top, Filters left, Export right */
        @media (min-width: 826px) and (max-width: 1023px) {
            body {
                padding: 32px;
            }

            .table-card {
                padding: 32px;
            }

            .header-actions {
                flex-direction: row;
                justify-content: space-between;
                /* Filters left, Export right */
                align-items: center;
                gap: 16px;
                margin-top: 16px;
                width: 100%;
            }
        }

        /* Small Desktop / Large Tablet (1024px - 1174px): Title top, Filters & Export together below, grouped left */
        @media (min-width: 1024px) and (max-width: 1174px) {
            body {
                padding: 32px;
            }

            .container {
                padding: 32px;
            }

            .header-section {
                flex-direction: column;
                align-items: flex-start;
            }

            .header-title-description {
                margin-bottom: 16px;
            }

            .header-actions {
                flex-direction: row;
                justify-content: flex-start;
                align-items: center;
                gap: 12px;
                width: 100%;
                margin-top: 16px;
            }
        }

        /* Large Desktop / Laptop (1175px and up): Title left, Filters & Export together right */
        @media (min-width: 1175px) {
            body {
                padding: 32px;
            }

            .container {
                padding: 32px;
            }

            .header-section {
                flex-direction: row;
                justify-content: space-between;
                align-items: center;
            }

            .header-title-description {
                margin-bottom: 0;
            }

            .header-actions {
                flex-direction: row;
                justify-content: flex-start;
                align-items: center;
                gap: 12px;
                width: auto;
                margin-top: 0;
            }
        }
    </style>
</head>

        const userTableBody = document.getElementById('userTableBody');

        function renderTable(usersToRender) {
            userTableBody.innerHTML = ''; // Clear existing rows
            usersToRender.forEach((user, index) => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td><input type="checkbox"></td>
                    <td>${user.id}</td>
                    <td>
                        <div class="user-name">${user.name}</div>
                        <div class="user-email">${user.email}</div>
                    </td>
                    <td>
                        <div class="studio-info">
                            <img src="${user.studioIcon}" alt="${user.studio} logo" onerror="this.src='https://placehold.co/24x24/cccccc/999999?text=Err'; this.onerror=null;">
                            <span>${user.studio}</span>
                        </div>
                    </td>
                    <td>${user.category}</td>
                    <td>${user.role}</td>
                    <td>
                        <span class="status-dot ${user.status === 'Active' ? 'status-active-dot' : 'status-inactive-dot'}"></span>
                        <span class="${user.status === 'Active' ? 'status-active-text' : 'status-inactive-text'}">${user.status}</span>
                    </td>
                    <td>${user.dateAdded}</td>
                    <td class="actions-cell"> 
                        <div class="table-row-action-dropdown">
                            <button type="button" onclick="toggleDropdown('actionsDropdown-${user.id}')" class="actions-button">

                                </svg>
                            </button>
                            <div id="actionsDropdown-${user.id}" class="dropdown-menu actions-dropdown-menu" role="menu">
                                <a href="#" role="menuitem">View Profile</a>
                                <a href="#" role="menuitem">Edit User</a>
                                <a href="#" class="text-red" role="menuitem">Deactivate</a>
                            </div>
                        </div>
                    </td>
                `;
                userTableBody.appendChild(row);
            });
        }

        // Initial table render
        renderTable(users);

        // Dropdown toggle function
        function toggleDropdown(dropdownId) {
            // Close all other open dropdowns first
            document.querySelectorAll('.dropdown-menu').forEach(menu => {
                if (menu.id !== dropdownId && menu.classList.contains('show')) {
                    menu.classList.remove('show');
                }
            });
            // Toggle the target dropdown
            const dropdown = document.getElementById(dropdownId);
            if (dropdown) {
                dropdown.classList.toggle('show');
            }
        }

        // Close dropdowns when clicking outside
        window.onclick = function (event) {
            let clickedOnToggle = false;
            const target = event.target;

            // Check if the click is on a dropdown toggle button
            if (target.closest('button[id$="-menu-button"]') || target.closest('button[onclick^="toggleDropdown"]')) {
                clickedOnToggle = true;
            }

            // If the click was not on a toggle button, proceed to close open menus
            if (!clickedOnToggle) {
                document.querySelectorAll('.dropdown-menu.show').forEach(menu => {
                    // Additionally, ensure the click is not within the dropdown menu itself
                    if (!menu.contains(target)) {
                        menu.classList.remove('show');
                    }
                });
            }
        }
    </script>
